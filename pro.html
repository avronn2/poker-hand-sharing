<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e0c1f">
<title>Showdown Pro · Casillas</title>
<style>
:root {
  --bg: #0e0c1f;
  --panel: #14122a;
  --panel-2: #1a1632;
  --ink: #f2eeff;
  --ink-dim: #9b96c4;
  --line: #2b2748;
  --accent: #34d6c4;
  --pink: #ff7eb6;
  --purple: #b07cff;
  --danger: #f04b5a;
  --warn: #f0c44d;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; background: var(--bg); color: var(--ink);
  font: 14px/1.5 "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, sans-serif;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}
button, input, textarea { font-family: inherit; color: inherit; }
button { cursor: pointer; }

/* Header */
.topbar {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 12px 16px; border-bottom: 1px solid var(--line);
  background: var(--panel); position: sticky; top: 0; z-index: 10;
}
.brand {
  font-weight: 800; letter-spacing: 1.4px; font-size: 13px;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  flex-shrink: 0;
}
.brand small { color: var(--ink-dim); font-weight: 600; font-size: 11px; letter-spacing: 1.2px; margin-left: 6px; background: none; -webkit-text-fill-color: var(--ink-dim); }
.identity { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.identity .avatar {
  width: 30px; height: 30px; border-radius: 50%; overflow: hidden; position: relative;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  display: flex; align-items: center; justify-content: center;
  color: #0c1226; font-weight: 800; font-size: 11px;
  flex-shrink: 0;
}
.identity .avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.identity .name { font-size: 13px; font-weight: 700; }
.sandbox-tag {
  background: var(--warn); color: #1c1b2c;
  font-size: 9px; font-weight: 800; padding: 3px 7px; border-radius: 4px;
  letter-spacing: .6px; flex-shrink: 0;
}

.container { max-width: 760px; margin: 0 auto; padding: 16px; }

/* Tabs */
.tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.tab {
  background: var(--panel); color: var(--ink-dim);
  border: 1px solid var(--line); border-radius: 999px;
  padding: 7px 14px; font-size: 12px; font-weight: 700;
}
.tab.active { background: var(--accent); color: #0c1226; border-color: var(--accent); }
.tab .count { opacity: .7; margin-left: 3px; font-weight: 600; }

/* Review cards */
.review-card {
  display: flex; gap: 12px; align-items: center;
  background: var(--panel-2); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px; margin-bottom: 10px;
  cursor: pointer; transition: border-color .15s ease, transform .15s ease;
}
.review-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.review-card .thumb {
  width: 96px; height: 64px; flex-shrink: 0; border-radius: 8px; overflow: hidden;
  background: #14122a;
}
.review-card .thumb svg { display: block; width: 100%; height: 100%; }
.review-card .meta { flex: 1; min-width: 0; }
.review-card .row1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.tier-badge {
  font-size: 10px; font-weight: 800; padding: 3px 7px; border-radius: 4px;
  background: var(--panel); color: var(--ink); border: 1px solid var(--line);
  letter-spacing: .4px;
}
.tier-badge.voice { background: var(--accent); color: #0c1226; border-color: var(--accent); }
.review-card .who {
  font-size: 12px; color: var(--ink); margin-top: 5px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.review-card .title-line { font-size: 11px; color: var(--ink-dim); margin-top: 2px; }
.sla { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; }
.sla .dot { width: 8px; height: 8px; border-radius: 50%; }
.sla.green { color: #6ce29e; } .sla.green .dot { background: #6ce29e; }
.sla.amber { color: var(--warn); } .sla.amber .dot { background: var(--warn); }
.sla.red   { color: var(--danger); } .sla.red   .dot { background: var(--danger); }
.review-card .sla { margin-top: 6px; }
.review-card .chev { color: var(--ink-dim); font-size: 22px; flex-shrink: 0; font-weight: 300; }

.empty { text-align: center; padding: 60px 20px; color: var(--ink-dim); font-size: 13px; }

/* Detail view */
.detail-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
.back-btn {
  background: transparent; border: 0; color: var(--accent);
  font-size: 14px; font-weight: 700; padding: 4px 0;
}
.detail-title { font-size: 17px; font-weight: 800; margin: 0 0 3px; letter-spacing: -0.2px; }
.detail-sub { font-size: 12px; color: var(--ink-dim); margin: 0 0 14px; }
/* Sticky hand reference — pinned at the TOP of the viewport. By default shows
   only the bottom half of the canvas (the street action timeline, which is
   what Casillas references most while writing notes). Tap header to expand
   and see the full table; tap again to shrink. Action buttons stay sticky at
   the bottom of the viewport via .detail-actions. */
.hand-image {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 8px);
  left: 12px; right: 12px;
  max-width: 736px;
  margin: 0 auto;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  box-shadow: 0 6px 22px rgba(0,0,0,0.45);
  max-height: 28vh;
  overflow: hidden;
  z-index: 9;
  display: flex; flex-direction: column;
  transition: max-height 0.25s ease;
}
.hand-image .hand-image-head {
  flex: 0 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px;
  border-bottom: 1px solid var(--line);
  font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
  text-transform: uppercase; color: var(--ink-dim);
  cursor: pointer;
  user-select: none;
}
.hand-image .hand-image-collapse {
  background: transparent; border: 0; color: var(--ink-dim);
  font-size: 14px; padding: 2px 6px; cursor: pointer; line-height: 1;
  transition: transform 0.2s ease;
}
.hand-image .hand-image-body {
  flex: 1; min-height: 0;
  overflow: hidden;
  position: relative;
}
/* Default (streets-only): the image fills the container width at its natural
   aspect ratio and is bottom-anchored via flex align-items:flex-end. Overflow
   at the top gets clipped, so only the BOTTOM of the image is visible. This
   approach is reliable across all image aspect ratios (object-fit cover and
   absolute positioning both have edge cases). */
.hand-image.streets-only .hand-image-body {
  flex: 0 0 24vh;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
}
.hand-image.streets-only .hand-image-body img,
.hand-image.streets-only .hand-image-body svg {
  width: 100%;
  height: auto;
  display: block;
  flex-shrink: 0;   /* don't let flex squish the image vertically */
  max-width: 100%;
}

/* Expanded: show the full image at natural aspect, capped to the body height
   via object-fit: contain. */
.hand-image.expanded {
  max-height: 56vh;
}
.hand-image.expanded .hand-image-body {
  height: 52vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px;
}
.hand-image.expanded .hand-image-body img,
.hand-image.expanded .hand-image-body svg {
  display: block;
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
}
.hand-image.expanded .hand-image-collapse { transform: rotate(180deg); }
.hand-image.collapsed { max-height: 38px; }
.hand-image.collapsed .hand-image-body { display: none; }
.hand-image.collapsed .hand-image-collapse { transform: rotate(180deg); }
/* The note columns need top padding so the fixed image doesn't cover them. */
.streets-grid { padding-top: calc(30vh + env(safe-area-inset-top, 0px)); padding-bottom: 90px; }
.streets-grid.image-expanded { padding-top: calc(52vh + env(safe-area-inset-top, 0px)); }
.streets-grid.image-collapsed { padding-top: 60px; }

/* Override the default streets-title margin so it sits below the sticky image. */
.streets-title { margin-top: 4px !important; }

.streets-title {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .8px; color: var(--ink-dim); margin: 14px 0 8px;
}

/* Street note input — column grid that mirrors what the user sees.
   4 columns on desktop, single column on phones. Each column has the street
   name, an avatar tag for Casillas, and the input (textarea or recorder). */
.streets-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
@media (max-width: 720px) { .streets-grid { grid-template-columns: 1fr; } }
.col-card {
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-left: 3px solid var(--accent);
  border-radius: 12px;
  padding: 10px 12px 12px;
  display: flex; flex-direction: column; gap: 8px;
  min-width: 0;
}
.col-card .col-head {
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px dashed var(--line);
  padding-bottom: 6px;
}
.col-card .col-name {
  font-size: 12px; font-weight: 800; color: var(--ink);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.col-card .col-pro {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; color: var(--accent);
  letter-spacing: 0.3px;
}
.col-card .col-pro .col-avatar {
  width: 18px; height: 18px; border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  position: relative; overflow: hidden;
}
.col-card .col-pro .col-avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.col-card .col-body { display: flex; flex-direction: column; gap: 8px; }
.col-card textarea.col-input {
  width: 100%; min-height: 90px; padding: 8px 10px;
  background: var(--bg); border: 1px solid var(--line);
  border-radius: 8px; color: var(--ink);
  font: inherit; font-size: 13px; line-height: 1.5; resize: vertical;
}
.col-card textarea.col-input:focus { outline: none; border-color: var(--accent); }
.col-card .col-status {
  font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
  color: var(--ink-dim);
}
.col-card .col-status.has { color: var(--accent); }

/* (Legacy collapsible-row CSS kept around in case anything else still uses it.) */
.street-row {
  background: var(--panel-2); border: 1px solid var(--line);
  border-radius: 12px; margin-bottom: 8px; overflow: hidden;
}
.street-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; cursor: pointer; user-select: none;
}
.street-head .label {
  font-size: 13px; font-weight: 800; color: var(--accent);
  text-transform: uppercase; letter-spacing: .8px;
}
.street-head .right { display: flex; align-items: center; gap: 10px; }
.street-head .status { font-size: 11px; color: var(--ink-dim); }
.street-head .status.has { color: var(--accent); }
.street-head .chev { color: var(--ink-dim); font-size: 14px; transition: transform .2s ease; }
.street-row.open .street-head .chev { transform: rotate(90deg); }
.street-body { display: none; padding: 0 14px 14px; border-top: 1px solid var(--line); }
.street-row.open .street-body { display: block; }

textarea.street-input {
  width: 100%; min-height: 80px; padding: 10px 12px;
  background: var(--bg); border: 1px solid var(--line);
  border-radius: 8px; color: var(--ink); font-size: 13px; line-height: 1.5;
  margin-top: 10px; resize: vertical;
}
textarea.street-input:focus { outline: none; border-color: var(--accent); }

/* Voice recorder */
.recorder { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
.rec-row { display: flex; align-items: center; gap: 10px; }
.rec-btn {
  background: var(--accent); color: #0c1226;
  border: 0; border-radius: 8px; padding: 9px 14px;
  font-size: 13px; font-weight: 800;
  display: inline-flex; align-items: center; gap: 8px;
}
.rec-btn.recording { background: var(--danger); color: #fff; }
.rec-btn.recording .pulse { width: 10px; height: 10px; border-radius: 50%; background: #fff; animation: rec-pulse 1.2s ease-in-out infinite; }
@keyframes rec-pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
.rec-time { font-size: 12px; color: var(--ink-dim); font-variant-numeric: tabular-nums; min-width: 36px; }
.rec-playback { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.rec-playback audio { flex: 1; min-width: 200px; }
.rec-clear {
  background: transparent; color: var(--ink-dim);
  border: 1px solid var(--line); border-radius: 6px;
  padding: 6px 10px; font-size: 11px; font-weight: 700;
}

/* Footer actions (sticky) */
.detail-actions {
  display: flex; gap: 10px; margin-top: 18px;
  position: sticky; bottom: 0;
  padding: 14px 0; background: linear-gradient(to top, var(--bg) 80%, transparent);
}
.btn-primary {
  flex: 1; background: var(--accent); color: #0c1226;
  border: 0; border-radius: 10px; padding: 13px;
  font-size: 14px; font-weight: 800;
}
.btn-primary:disabled { background: var(--panel); color: var(--ink-dim); cursor: not-allowed; }
.btn-secondary {
  background: var(--panel-2); color: var(--ink); border: 1px solid var(--line);
  border-radius: 10px; padding: 13px 16px; font-size: 13px; font-weight: 700;
}

/* Toast */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #0c1226;
  padding: 10px 18px; border-radius: 8px;
  font-size: 13px; font-weight: 800;
  opacity: 0; pointer-events: none;
  transition: opacity .2s ease, transform .2s ease;
  z-index: 100;
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(-5px); }
.toast.err { background: var(--danger); color: #fff; }

.sandbox-banner {
  background: rgba(240,196,77,0.12); border: 1px solid rgba(240,196,77,0.4);
  color: var(--warn); border-radius: 10px; padding: 10px 12px;
  font-size: 12px; line-height: 1.5; margin-bottom: 14px;
}
.sandbox-banner b { color: var(--warn); }

/* Diagnostic strip sits right under the sandbox banner. Honest report on what
   /pro actually sees in localStorage, including the most-recent submission time
   and the browser fingerprint (so the user can tell if it's the same browser). */
.diag-strip {
  font-size: 11px; color: var(--ink-dim);
  background: var(--panel-2); border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; margin: 0 0 14px;
  line-height: 1.5;
}
.diag-strip b { color: var(--ink); }
.diag-strip.warn { border-color: var(--warn); color: var(--warn); }
.diag-strip.warn b { color: var(--warn); }
.diag-strip.ok b { color: var(--accent); }
.diag-strip .diag-row { display: flex; justify-content: space-between; gap: 8px; }
.diag-strip code { font-size: 10px; opacity: .8; }

@media (max-width: 600px) {
  .container { padding: 12px; }
  .review-card .thumb { width: 78px; height: 54px; }
  .review-card { padding: 10px; gap: 10px; }
  .detail-title { font-size: 15px; }
}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">SHOWDOWN<small>PRO</small></div>
  <span class="sandbox-tag">SANDBOX</span>
  <div class="identity">
    <div class="avatar"><img src="eyal.jpg" alt="" onerror="this.remove()"><span>EE</span></div>
    <div class="name">Casillas</div>
  </div>
</div>

<div class="container">
  <!-- Dashboard view -->
  <div id="dashboardView">
    <div class="sandbox-banner">
      <b>Sandbox mode</b> &mdash; mock reviews seed the queue; anything a user requests from <code>showdown.cards</code> shows up here tagged <b>LIVE</b>. Hit Send and it lands in their banner.
    </div>
    <!-- Diagnostic strip: shows exactly what localStorage looks like to /pro.
         If 0 reviews show but the user just sent one, this proves the two pages
         aren't sharing storage (different browser/device/PWA context). -->
    <div id="proDiag" class="diag-strip"></div>
    <div class="tabs">
      <button class="tab active" data-tab="pending">Pending <span class="count" id="pendingCount">0</span></button>
      <button class="tab" data-tab="delivered">Delivered <span class="count" id="deliveredCount">0</span></button>
    </div>
    <div id="reviewList"></div>
  </div>

  <!-- Detail view -->
  <div id="detailView" style="display:none">
    <div class="detail-header">
      <button class="back-btn" id="backBtn">← Back to queue</button>
      <div id="detailSla"></div>
    </div>
    <h2 class="detail-title" id="detailTitle"></h2>
    <p class="detail-sub" id="detailSub"></p>
    <!-- Sticky hand reference at the TOP of the viewport. Three states:
         streets-only (default, shows just the action timeline), expanded
         (full table + timeline), collapsed (just the header bar). Tap header
         to cycle. -->
    <div class="hand-image streets-only" id="detailImage">
      <div class="hand-image-head">
        <span>Hand reference &middot; <span id="handImageHint" style="color:var(--ink-dim);font-weight:600;text-transform:none;letter-spacing:0;">Tap to see full table</span></span>
        <button type="button" class="hand-image-collapse" id="handImageCollapse" aria-label="Toggle">▼</button>
      </div>
      <div class="hand-image-body" id="detailImageBody"></div>
    </div>
    <div class="streets-title">Your notes — one card per street (this is what the user sees)</div>
    <div id="streetsList" class="streets-grid"></div>
    <div class="detail-actions">
      <button class="btn-secondary" id="saveDraftBtn">Save draft</button>
      <button class="btn-primary" id="sendBtn">Send to user</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Saved</div>

<script>
const $ = sel => document.querySelector(sel);
const STORAGE_KEY = "showdown_pro_sandbox_v1";   // mock reviews + Casillas's drafts
const REAL_KEY = "showdown_reviews_v1";          // bus shared with index.html (real submissions)
const STREETS = ["preflop", "flop", "turn", "river"];

function showToast(msg, isErr) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.toggle("err", !!isErr);
  t.classList.add("on");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("on"), 2000);
}

/* ---------- SVG mock hand image generator ---------- */
function makeHandSvg(opts) {
  const o = Object.assign({
    heroPos: "BTN", villainPos: "CO",
    heroCards: ["Ah", "Ks"],
    board: ["Jc", "9h", "3d"],
    pot: "12bb",
  }, opts || {});
  const card = (rank, suit, x, y, w, h) => {
    w = w || 36; h = h || 50;
    const red = suit === "h" || suit === "d";
    const sym = { s: "♠", h: "♥", d: "♦", c: "♣" }[suit] || "?";
    const color = red ? "#d4537e" : "#1c1b2c";
    return `<g transform="translate(${x} ${y})">
      <rect width="${w}" height="${h}" rx="4" fill="#f4f1ea"/>
      <text x="5" y="14" font-family="-apple-system,sans-serif" font-size="13" font-weight="800" fill="${color}">${rank}</text>
      <text x="5" y="${h - 6}" font-family="-apple-system,sans-serif" font-size="14" fill="${color}">${sym}</text>
    </g>`;
  };
  const pill = (label, x, y, hero) => {
    const bg = hero ? "#22363f" : "#2c2550";
    const stroke = hero ? "#5ae5c8" : "#3a3266";
    const text = hero ? "#5ae5c8" : "#d7d2ec";
    return `<g>
      <rect x="${x - 26}" y="${y - 11}" width="52" height="22" rx="11" fill="${bg}" stroke="${stroke}" stroke-width="1.5"/>
      <text x="${x}" y="${y + 4}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="800" fill="${text}">${label}</text>
    </g>`;
  };
  const boardW = o.board.length ? (o.board.length * 36 + (o.board.length - 1) * 6) : 0;
  const boardStartX = 260 - boardW / 2;
  return `<svg viewBox="0 0 520 320" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="felt" cx="50%" cy="50%" r="65%">
        <stop offset="0%" stop-color="#1a5d44"/>
        <stop offset="100%" stop-color="#0e3327"/>
      </radialGradient>
      <linearGradient id="rail" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#6b4520"/>
        <stop offset="100%" stop-color="#3a2613"/>
      </linearGradient>
    </defs>
    <rect width="520" height="320" fill="#14122a"/>
    <ellipse cx="260" cy="160" rx="240" ry="135" fill="url(#rail)"/>
    <ellipse cx="260" cy="160" rx="225" ry="120" fill="url(#felt)"/>
    ${o.board.map((c, i) => card(c[0], c[1], boardStartX + i * 42, 145)).join("")}
    <text x="260" y="${o.board.length ? 225 : 175}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="800" fill="#f0c44d">POT ${o.pot}</text>
    ${pill(o.villainPos, 260, 35, false)}
    ${pill(o.heroPos, 260, 295, true)}
    ${card(o.heroCards[0][0], o.heroCards[0][1], 234, 250)}
    ${card(o.heroCards[1][0], o.heroCards[1][1], 250, 250)}
  </svg>`;
}

/* ---------- mock data ----------
   Backlog intentionally empty — Eyal's queue is driven entirely by real submissions
   from showdown.cards now. The makeHandSvg() helper above is kept around for any
   future seeding we want to do (e.g. demo mode for press shots). */
const MOCK = [];

// One-shot cleanup: earlier sandbox builds seeded localStorage with 4 stale rev_001…rev_004
// mock reviews. Drop them so Eyal sees a clean queue on next open.
(() => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s && Array.isArray(s.reviews)) {
      const cleaned = s.reviews.filter(r => !/^rev_00[1-4]$/.test(r.id || ""));
      if (cleaned.length !== s.reviews.length) {
        s.reviews = cleaned;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
      }
    }
  } catch (_) {}
})();

/* ---------- state ---------- */
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch (_) { return {}; }
}
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (_) {} }
let state = loadState();
if (!state.reviews || !state.reviews.length) {
  state.reviews = MOCK.map(r => Object.assign({ status: "pending", notes: {} }, r));
  saveState();
}

/* Real submissions come in via the showdown_reviews_v1 bus (written by index.html).
   We normalize their shape to match the mock shape so the renderer can be unaware.
   The `source` field tags them as live, so we can show a "LIVE" badge. */
function loadRealReviews() {
  try { return JSON.parse(localStorage.getItem(REAL_KEY)) || []; }
  catch (_) { return []; }
}
function saveRealReviews(arr) {
  try { localStorage.setItem(REAL_KEY, JSON.stringify(arr)); } catch (_) {}
}
// Pull the hand image — either from the review record itself (legacy v1.2.2
// records embedded it) or by looking up the linked saved hand in shared
// localStorage. The latter is the v1.2.3+ default since it avoids storing the
// same image twice and blowing the quota.
function resolveHandImage(r) {
  if (r.handImageDataUrl) return r.handImageDataUrl;
  if (r.savedHandId) {
    try {
      const hands = JSON.parse(localStorage.getItem("showdown_hands_v1") || "[]");
      const h = hands.find(x => x.id === r.savedHandId);
      if (h && h.imageDataUrl) return h.imageDataUrl;
    } catch (_) {}
  }
  return null;
}

function normalizeReal(r) {
  // Map index.html review shape → pro.html review shape
  return {
    id: r.id,
    userEmail: r.userEmail,
    tier: r.tier,
    createdAt: r.createdAt,
    handImageDataUrl: resolveHandImage(r),   // <img src="…"> instead of inline SVG
    handTitle: r.handTitle,
    status: r.status === "delivered" ? "delivered" : "pending",  // "paid" → "pending"
    notes: r.notes || {},
    deliveredAt: r.deliveredAt || 0,
    source: "real",
    _raw: r   // keep a handle to write back to the shared bus on Send
  };
}

function getAllReviews() {
  // Real submissions first (newest first), then mock — for both Pending and Delivered tabs.
  const real = loadRealReviews().map(normalizeReal);
  return real.concat(state.reviews);
}
function getReview(id) {
  const all = getAllReviews();
  return all.find(r => r.id === id);
}

function setNote(id, street, patch) {
  const r = getReview(id); if (!r) return;
  r.notes = r.notes || {};
  r.notes[street] = Object.assign({}, r.notes[street] || {}, patch);
  if (r.source === "real") {
    // Persist back to the shared bus
    const real = loadRealReviews();
    const idx = real.findIndex(x => x.id === id);
    if (idx >= 0) {
      real[idx].notes = real[idx].notes || {};
      real[idx].notes[street] = Object.assign({}, real[idx].notes[street] || {}, patch);
      saveRealReviews(real);
    }
  } else {
    saveState();
  }
}

/* ---------- SLA ---------- */
function sla(createdAt) {
  const hours = (createdAt + 48 * 3600e3 - Date.now()) / 3600e3;
  if (hours <= 0) return { cls: "red", label: "Overdue" };
  if (hours < 12) return { cls: "red", label: `Due in ${Math.round(hours)}h` };
  if (hours < 24) return { cls: "amber", label: `Due in ${Math.round(hours)}h` };
  return { cls: "green", label: `Due in ${Math.round(hours)}h` };
}

/* ---------- dashboard render ---------- */
let currentTab = "pending";
let currentReviewId = null;

function thumbHtml(r) {
  // Real submissions ship a base64 image dataURL; mocks ship an inline SVG string.
  if (r.handImageDataUrl) return `<img src="${r.handImageDataUrl}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">`;
  return r.handImageSvg || "";
}

function renderDiagnostic() {
  const el = $("#proDiag"); if (!el) return;
  const raw = (() => { try { return localStorage.getItem(REAL_KEY); } catch (_) { return null; } })();
  let n = 0, latest = 0;
  try {
    const arr = JSON.parse(raw || "[]");
    n = arr.length;
    arr.forEach(r => { if ((r.createdAt || 0) > latest) latest = r.createdAt; });
  } catch (_) {}
  const origin = (typeof location !== "undefined") ? location.host : "?";
  const ago = latest ? Math.round((Date.now() - latest) / 1000) : 0;
  const agoStr = !latest ? "—" :
    ago < 60   ? `${ago}s ago` :
    ago < 3600 ? `${Math.round(ago / 60)}m ago` :
    ago < 86400 ? `${Math.round(ago / 3600)}h ago` :
    `${Math.round(ago / 86400)}d ago`;
  el.classList.toggle("warn", n === 0);
  el.classList.toggle("ok",   n > 0);
  el.innerHTML = `
    <div class="diag-row">
      <span><b>${n}</b> submission${n === 1 ? "" : "s"} in this browser's storage</span>
      <span>last write: <b>${agoStr}</b></span>
    </div>
    ${n === 0 ? `<div style="margin-top:4px">If you just sent a hand and don't see it: make sure <code>${origin}</code> is the same browser you sent from. localStorage isn't shared across devices/browsers/PWAs.</div>` : ""}
  `;
}

function renderDashboard() {
  renderDiagnostic();
  const list = $("#reviewList");
  const all = getAllReviews();
  const pending = all.filter(r => r.status === "pending");
  const delivered = all.filter(r => r.status === "delivered");
  $("#pendingCount").textContent = pending.length;
  $("#deliveredCount").textContent = delivered.length;
  const items = currentTab === "pending"
    ? pending.slice().sort((a, b) => {
        // Real submissions to the top, then by oldest createdAt (closest to SLA)
        if (a.source === "real" && b.source !== "real") return -1;
        if (b.source === "real" && a.source !== "real") return 1;
        return a.createdAt - b.createdAt;
      })
    : delivered.slice().sort((a, b) => (b.deliveredAt || 0) - (a.deliveredAt || 0));
  if (!items.length) {
    list.innerHTML = `<div class="empty">No ${currentTab} reviews ${currentTab === "pending" ? "right now — sit tight" : "yet"}.</div>`;
    return;
  }
  list.innerHTML = items.map(r => {
    const s = currentTab === "pending" ? sla(r.createdAt) : { cls: "green", label: "Delivered" };
    const tierLabel = r.tier === "voice" ? "Voice memo · $15" : "Written note · $5";
    const liveTag = r.source === "real" ? `<span class="tier-badge" style="background:var(--pink);color:#1c1b2c;border-color:var(--pink);">LIVE</span>` : "";
    return `<div class="review-card" data-id="${r.id}">
      <div class="thumb">${thumbHtml(r)}</div>
      <div class="meta">
        <div class="row1">${liveTag}<span class="tier-badge ${r.tier}">${tierLabel}</span></div>
        <div class="who">${escapeHtml(r.userEmail)}</div>
        <div class="title-line">${escapeHtml(r.handTitle || "Hand review")}</div>
        <div class="sla ${s.cls}"><span class="dot"></span>${s.label}</div>
      </div>
      <div class="chev">›</div>
    </div>`;
  }).join("");
  list.querySelectorAll(".review-card").forEach(el => {
    el.addEventListener("click", () => openReview(el.dataset.id));
  });
}

function escapeHtml(s) { return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    currentTab = t.dataset.tab;
    renderDashboard();
  });
});

/* ---------- detail view ---------- */
function openReview(id) {
  const r = getReview(id); if (!r) return;
  currentReviewId = id;
  $("#dashboardView").style.display = "none";
  $("#detailView").style.display = "block";
  const tierWord = r.tier === "voice" ? "Voice memo" : "Written note";
  $("#detailTitle").textContent = `${tierWord} for ${r.userEmail}`;
  $("#detailSub").textContent = r.handTitle || "";
  const s = r.status === "pending" ? sla(r.createdAt) : { cls: "green", label: "Delivered" };
  $("#detailSla").innerHTML = `<span class="sla ${s.cls}"><span class="dot"></span>${s.label}</span>${r.source === "real" ? ` <span class="tier-badge" style="background:var(--pink);color:#1c1b2c;border-color:var(--pink);margin-left:6px;">LIVE</span>` : ""}`;
  $("#detailImageBody").innerHTML = thumbHtml(r);
  renderStreets(r);
  $("#sendBtn").disabled = r.status === "delivered";
  $("#sendBtn").textContent = r.status === "delivered" ? "Already delivered" : "Send to user";
  $("#saveDraftBtn").style.display = r.status === "delivered" ? "none" : "";
  window.scrollTo(0, 0);
}
function closeReview() {
  currentReviewId = null;
  $("#detailView").style.display = "none";
  $("#dashboardView").style.display = "block";
  renderDashboard();
}
$("#backBtn").addEventListener("click", closeReview);

// Three-state toggle for the sticky hand reference: "streets" (bottom-half
// only, default), "expanded" (full image — table + timeline), "collapsed" (just
// the header bar). Tap header to cycle: streets → expanded → collapsed →
// streets. State persists across reviews via localStorage.
const HAND_STATE_KEY = "showdown_pro_hand_state";
function applyHandImageState() {
  const state = localStorage.getItem(HAND_STATE_KEY) || "streets";
  const img = $("#detailImage"); const grid = $("#streetsList");
  if (img) {
    img.classList.toggle("streets-only", state === "streets");
    img.classList.toggle("expanded", state === "expanded");
    img.classList.toggle("collapsed", state === "collapsed");
  }
  if (grid) {
    grid.classList.toggle("image-expanded", state === "expanded");
    grid.classList.toggle("image-collapsed", state === "collapsed");
  }
  // Update header hint
  const hint = $("#handImageHint");
  if (hint) {
    hint.textContent = state === "streets" ? "Tap to see full table"
                     : state === "expanded" ? "Tap to collapse"
                     : "Tap to expand";
  }
}
function cycleHandImageState() {
  const order = ["streets", "expanded", "collapsed"];
  const cur = localStorage.getItem(HAND_STATE_KEY) || "streets";
  const next = order[(order.indexOf(cur) + 1) % order.length];
  localStorage.setItem(HAND_STATE_KEY, next);
  applyHandImageState();
}
$("#handImageCollapse").addEventListener("click", (e) => {
  e.stopPropagation();
  cycleHandImageState();
});
$("#detailImage .hand-image-head").addEventListener("click", (e) => {
  if (e.target.closest("#handImageCollapse")) return;
  cycleHandImageState();
});
applyHandImageState();

/* ---------- streets ----------
   Column-grid layout: one card per street (preflop/flop/turn/river). Each card
   has a Casillas badge at the top right and the input (textarea or recorder)
   filling the body. The visual matches what the user will see on their side. */
function renderStreets(r) {
  const list = $("#streetsList");
  list.innerHTML = STREETS.map(s => {
    const note = (r.notes && r.notes[s]) || {};
    const hasContent = (r.tier === "voice" ? !!note.audio : !!(note.text && note.text.trim()));
    const body = r.tier === "text"
      ? `<textarea class="col-input" placeholder="Your read on the ${s} action…">${escapeHtml(note.text || "")}</textarea>`
      : `<div class="recorder" data-street-rec="${s}">
          ${note.audio
            ? `<div class="rec-playback">
                <audio controls preload="metadata" src="${note.audio}"></audio>
                <button type="button" class="rec-clear">Re-record</button>
              </div>`
            : `<div class="rec-row">
                <button type="button" class="rec-btn"><span>🎤</span><span>Record</span></button>
                <span class="rec-time">0:00</span>
              </div>`}
        </div>`;
    return `<div class="col-card" data-street="${s}">
      <div class="col-head">
        <span class="col-name">${s}</span>
        <span class="col-pro">
          <span class="col-avatar"><img src="eyal.jpg" alt="" onerror="this.parentNode.style.background='linear-gradient(135deg,var(--pink),var(--purple))'"></span>
          Casillas
        </span>
      </div>
      <div class="col-body">${body}</div>
      <div class="col-status ${hasContent ? "has" : ""}">${hasContent ? "✓ noted" : "add note"}</div>
    </div>`;
  }).join("");
  list.querySelectorAll(".col-card").forEach(card => {
    if (r.tier === "text") wireTextInput(card, r);
    else wireRecorder(card, r);
  });
}

function updateStatus(card, hasContent) {
  const s = card.querySelector(".col-status");
  if (!s) return;
  s.textContent = hasContent ? "✓ noted" : "add note";
  s.classList.toggle("has", !!hasContent);
}

function wireTextInput(row, r) {
  const input = row.querySelector("textarea");
  if (!input) return;
  input.addEventListener("input", () => {
    setNote(r.id, row.dataset.street, { text: input.value });
    updateStatus(row, !!input.value.trim());
  });
}

/* ---------- voice recorder ---------- */
function wireRecorder(row, r) {
  const street = row.dataset.street;
  const clear = row.querySelector(".rec-clear");
  if (clear) {
    clear.addEventListener("click", () => {
      setNote(r.id, street, { audio: null });
      renderStreets(r);
    });
    return;
  }
  const btn = row.querySelector(".rec-btn");
  const timeEl = row.querySelector(".rec-time");
  let recorder = null, chunks = [], startedAt = 0, tick = null;
  btn.addEventListener("click", async () => {
    if (!recorder || recorder.state === "inactive") {
      if (!navigator.mediaDevices || !window.MediaRecorder) {
        showToast("Voice recording not supported in this browser", true);
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
        recorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
          const reader = new FileReader();
          reader.onload = () => {
            try {
              setNote(r.id, street, { audio: reader.result });
              renderStreets(r);
              const newRow = document.querySelector(`#streetsList [data-street="${street}"]`);
              if (newRow) newRow.classList.add("open");
            } catch (e) {
              showToast("Audio too large to save locally", true);
            }
          };
          reader.readAsDataURL(blob);
        };
        recorder.start();
        startedAt = Date.now();
        btn.classList.add("recording");
        btn.innerHTML = `<span class="pulse"></span><span>Stop</span>`;
        tick = setInterval(() => {
          const sec = Math.floor((Date.now() - startedAt) / 1000);
          timeEl.textContent = `${Math.floor(sec / 60)}:${(sec % 60).toString().padStart(2, "0")}`;
        }, 250);
      } catch (e) {
        showToast("Microphone permission required", true);
      }
    } else if (recorder.state === "recording") {
      recorder.stop();
      clearInterval(tick);
      btn.classList.remove("recording");
    }
  });
}

/* ---------- send / draft ---------- */
$("#sendBtn").addEventListener("click", () => {
  if (!currentReviewId) return;
  const r = getReview(currentReviewId);
  if (!r || r.status === "delivered") return;
  const any = STREETS.some(s => {
    const n = r.notes && r.notes[s];
    if (!n) return false;
    return r.tier === "voice" ? !!n.audio : !!(n.text && n.text.trim());
  });
  if (!any) { showToast("Add a note on at least one street first", true); return; }
  r.status = "delivered";
  r.deliveredAt = Date.now();
  if (r.source === "real") {
    // Push the full delivered state back onto the shared bus so index.html sees it.
    const real = loadRealReviews();
    const idx = real.findIndex(x => x.id === r.id);
    if (idx >= 0) {
      real[idx].status = "delivered";
      real[idx].deliveredAt = r.deliveredAt;
      real[idx].notes = r.notes;
      saveRealReviews(real);
    }
  } else {
    saveState();
  }
  showToast(r.source === "real" ? "Delivered to user (sandbox)" : "Sent (sandbox)");
  setTimeout(closeReview, 700);
});
$("#saveDraftBtn").addEventListener("click", () => showToast("Draft saved"));

/* ---------- initial render + tick ---------- */
renderDashboard();
setInterval(() => {
  if ($("#dashboardView").style.display !== "none") renderDashboard();
}, 60000);

// When index.html writes a fresh submission to the shared bus from another tab,
// or this tab refreshes localStorage, re-render so it appears at the top of Pending.
window.addEventListener("storage", (e) => {
  if (e.key === REAL_KEY) {
    if ($("#dashboardView").style.display !== "none") renderDashboard();
  }
});

// iOS Safari doesn't always fire the 'storage' event between tabs reliably,
// especially after the tab has been backgrounded. Re-render whenever the user
// brings this tab into focus or visibility changes — guarantees the queue is
// fresh by the time they're looking at it.
function refreshIfDashboard() {
  if ($("#dashboardView").style.display !== "none") renderDashboard();
}
window.addEventListener("focus", refreshIfDashboard);
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) refreshIfDashboard();
});

// Manual refresh button in the topbar as a last-resort fallback for users
// who switch tabs / devices and want to verify they're on the latest queue.
(function addRefreshButton() {
  const topbar = document.querySelector(".topbar");
  if (!topbar || document.getElementById("proRefresh")) return;
  const btn = document.createElement("button");
  btn.id = "proRefresh";
  btn.type = "button";
  btn.title = "Refresh queue";
  btn.style.cssText = "background:var(--panel-2);border:1px solid var(--line);border-radius:8px;color:var(--ink-dim);width:30px;height:30px;font-size:14px;margin-left:6px;flex-shrink:0;";
  btn.innerHTML = "⟳";
  btn.onclick = () => { refreshIfDashboard(); showToast("Refreshed"); };
  // Insert before the identity block on the right
  const identity = topbar.querySelector(".identity");
  if (identity) topbar.insertBefore(btn, identity);
  else topbar.appendChild(btn);
})();
</script>
</body>
</html>
